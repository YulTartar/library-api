apiVersion: v1
kind: Namespace
metadata:
  name: library
---
apiVersion: v1
kind: Secret
metadata:
  name: library-secret
  namespace: library
type: Opaque
stringData:
  PG_USER: postgres
  PG_PASSWORD: postgres
  PG_DATABASE: library
  PG_SSLMODE: disable
  PG_HOST: library-postgres
  PG_PORT: "5432"
  SERVER_PORT: "8080"
  SERVER_READ_TIMEOUT: 5s
  SERVER_WRITE_TIMEOUT: 10s
  SERVER_IDLE_TIMEOUT: 120s
  PG_MAX_CONNS: "25"
  PG_MIN_CONNS: "5"
  PG_MAX_CONN_LIFETIME: 30m
  PG_MAX_CONN_IDLE_TIME: 5m
