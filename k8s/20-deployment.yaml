apiVersion: apps/v1
kind: Deployment
metadata:
  name: library-api
  namespace: library
  labels:
    app: library-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: library-api
  template:
    metadata:
      labels:
        app: library-api
    spec:
      containers:
        - name: library-api
          image: ghcr.io/yultartar/library-api:1.0.0
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: library-secret
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
